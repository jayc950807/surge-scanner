name: Strategy Optimizer (Auto Search)

on:
  workflow_dispatch:  # 수동 실행만

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 최대 6시간

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run optimizer
        run: python backtest_optimizer.py 2>&1 | tee optimizer_output.log

      - name: Summary
        if: always()
        run: |
          echo "### Optimizer Results 🔬" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f optimizer_best.csv ]; then
            echo "**Best strategies found:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -10 optimizer_best.csv >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f optimizer_output.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Log (last 15 lines):**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -15 optimizer_output.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add optimizer_best.csv optimizer_decent.csv optimizer_all_top100.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No result files to commit"
          else
            git commit -m "optimizer: $(date +%Y-%m-%d) auto search results"
            git push
          fi

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: optimizer-${{ github.run_id }}
          path: |
            optimizer_best.csv
            optimizer_decent.csv
            optimizer_all_top100.csv
            optimizer_output.log
          retention-days: 30
