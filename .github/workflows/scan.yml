name: Daily Surge Scan

on:
  schedule:
    # UTC 21:00 = KST 06:00 (평일만, 장마감 후 1시간 여유)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      reset_tracker:
        description: '포지션 전체 리셋 (YES 입력 시 초기화 후 재처리)'
        required: false
        default: ''
      reverify:
        description: '전체 히스토리 재검증 (YES 입력 시 모든 결과 재확인)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scanner.py

      - name: Run position tracker
        run: |
          if [ "${{ github.event.inputs.reverify }}" = "YES" ]; then
            echo "🔄 전체 히스토리 재검증 모드"
            python tracker.py --reverify
          elif [ "${{ github.event.inputs.reset_tracker }}" = "YES" ]; then
            echo "🔄 포지션 전체 리셋 모드"
            python tracker.py --reset
          else
            python tracker.py
          fi

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "scan: $(date +%Y-%m-%d) signal + tracker update"
            git push
          fi

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-${{ github.run_id }}
          path: data/signal_*.csv
          retention-days: 30
