name: Daily Surge Scan

on:
  schedule:
    # UTC 21:00 = KST 06:00 (평일만, 장마감 후 1시간 여유)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      reset_tracker:
        description: '포지션 전체 리셋 (YES 입력 시 초기화 후 재처리)'
        required: false
        default: ''
      reverify:
        description: '전체 히스토리 재검증 (YES 입력 시 모든 결과 재확인)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short 2>&1 || echo "⚠️ Some tests failed"

      - name: Run scanner
        id: scanner
        run: |
          python scanner.py 2>&1 | tee scanner_output.log
          echo "scanner_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Run position tracker
        if: steps.scanner.outcome == 'success'
        run: |
          if [ "${{ github.event.inputs.reverify }}" = "YES" ]; then
            echo "🔄 전체 히스토리 재검증 모드"
            python tracker.py --reverify
          elif [ "${{ github.event.inputs.reset_tracker }}" = "YES" ]; then
            echo "🔄 포지션 전체 리셋 모드"
            python tracker.py --reset
          else
            python tracker.py
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Scan Results 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f scanner_output.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 scanner_output.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Signal files:**" >> $GITHUB_STEP_SUMMARY
          ls -la data/signal_*.csv 2>/dev/null | tail -5 >> $GITHUB_STEP_SUMMARY || echo "No signal files found" >> $GITHUB_STEP_SUMMARY

      - name: Commit and push results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "scan: $(date +%Y-%m-%d) signal + tracker update"
            git push
          fi

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-${{ github.run_id }}
          path: |
            data/signal_*.csv
            data/positions_*.csv
            scanner_output.log
          retention-days: 30
