name: Backtest v2 (Tracker Rules)
on:
  workflow_dispatch:
    inputs:
      thresh:
        description: 'TP threshold (0.10 / 0.15 / 0.20 / 0.30 / all)'
        required: true
        default: '0.10'
      period:
        description: 'Max hold days (3 / 5 / 7 / 10 / 15 / 20 / all)'
        required: true
        default: '5'
permissions:
  contents: write
concurrency:
  group: backtest
  cancel-in-progress: false
jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run backtest
        env:
          PYTHONPATH: ${{ github.workspace }}/core
        run: |
          cd strategy_search
          if [ "${{ github.event.inputs.thresh }}" = "all" ] || [ "${{ github.event.inputs.period }}" = "all" ]; then
            echo "🔄 Running ALL 24 combinations..."
            python find_high_precision_v2.py --all 2>&1 | tee ../backtest_output.log
          else
            echo "🔄 Running THRESH=${{ github.event.inputs.thresh }} PERIOD=${{ github.event.inputs.period }}..."
            python find_high_precision_v2.py --thresh ${{ github.event.inputs.thresh }} --period ${{ github.event.inputs.period }} 2>&1 | tee ../backtest_output.log
          fi
      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy_search/backtest_v2_*.csv
          if git diff --staged --quiet; then
            echo "No results to commit"
          else
            git commit -m "backtest: v2 results (thresh=${{ github.event.inputs.thresh }}, period=${{ github.event.inputs.period }})"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push origin main && exit 0
              sleep $((RANDOM % 10 + 5))
            done
          fi
      - name: Upload results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: backtest-${{ github.run_id }}
          path: |
            strategy_search/backtest_v2_*.csv
            backtest_output.log
          retention-days: 90
