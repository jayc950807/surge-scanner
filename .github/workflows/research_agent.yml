name: "Autonomous Research Agent"

on:
  workflow_dispatch:
    inputs:
      max_cycles:
        description: "연구 사이클 수 (1회당 ~5분, API비용 ~$0.5)"
        required: false
        default: "8"
      focus:
        description: "연구 주제 (비워두면 자유 탐색)"
        required: false
        default: ""

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install anthropic yfinance pandas numpy scikit-learn lxml html5lib

      - name: Run Research Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_CYCLES: ${{ github.event.inputs.max_cycles }}
        run: python research_agent.py 2>&1 | tee research_agent_output.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-results-${{ github.run_number }}
          path: |
            data/research_report.md
            data/research_log.json
            data/research_knowledge.json
            data/research_strategies.json
            data/research_datasets/
            research_agent.log
            research_agent_output.log

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/research_report.md data/research_log.json data/research_knowledge.json data/research_strategies.json data/research_datasets/ || true
          git diff --cached --quiet || git commit -m "research: autonomous agent report ($(date +%Y-%m-%d))"
          git push || echo "Push failed"

      - name: Step Summary
        if: always()
        run: |
          if [ -f data/research_report.md ]; then
            echo "## Autonomous Research Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            head -200 data/research_report.md >> $GITHUB_STEP_SUMMARY
            TOTAL_LINES=$(wc -l < data/research_report.md)
            if [ "$TOTAL_LINES" -gt 200 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "*(리포트가 200줄을 초과하여 잘렸습니다. 전체 리포트는 Artifacts에서 다운로드하세요.)*" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### Agent Log (last 40 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -40 research_agent_output.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No log available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
