name: "Autonomous Research Agent"

on:
  workflow_dispatch:
    inputs:
      sample_size:
        description: "탐색 종목 수 (많을수록 정확, 시간 증가)"
        required: false
        default: "2000"

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install yfinance pandas numpy scikit-learn lxml html5lib

      - name: Run Research Agent (LLM-Free)
        env:
          SAMPLE_SIZE: ${{ github.event.inputs.sample_size }}
        run: python research_agent.py 2>&1 | tee research_agent_output.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-results-${{ github.run_number }}
          path: |
            data/research_report.md
            data/research_events.csv
            data/research_patterns.json
            data/research_strategies.json
            research_agent.log
            research_agent_output.log

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/research_report.md data/research_events.csv data/research_patterns.json data/research_strategies.json || true
          git diff --cached --quiet || git commit -m "research: auto-analysis report ($(date +%Y-%m-%d))"
          git push || echo "Push failed"

      - name: Step Summary
        if: always()
        run: |
          if [ -f data/research_report.md ]; then
            cat data/research_report.md >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### Log (last 30 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 research_agent_output.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
